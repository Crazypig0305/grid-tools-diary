{{ define "main" }}
<div class="layout">
  <main style="padding: 80px 0; text-align: center; grid-column: 1 / -1;">
    <p style="font-family: var(--mono); font-size: .75rem; color: var(--ink-lt); letter-spacing: .1em; margin-bottom: 12px;">404</p>
    <h1 style="font-family: var(--serif); font-size: 1.6rem; font-weight: 600; color: var(--ink); margin-bottom: 16px;">找不到這個頁面</h1>
    <p style="font-family: var(--zh); font-size: .95rem; color: var(--ink-mid); margin-bottom: 32px;">這個頁面可能已移除或網址有誤。</p>
    <a href="/" style="font-family: var(--zh); font-size: .88rem; color: var(--blue); text-decoration: none; padding: 9px 24px; border: 1px solid var(--blue); border-radius: 6px;">回到首頁</a>
  </main>
</div>
{{ end }}
