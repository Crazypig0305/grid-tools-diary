{{ $currentPage := . }}
<nav class="top-nav">
  <div class="top-nav-inner">
    <a href="/" class="nav-logo" aria-label="格子工具誌首頁">
      <div class="logo-grid">
        <span></span><span></span>
        <span></span><span style="background:var(--amber)"></span>
      </div>
    </a>
    <div class="tab-list">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="tab-item{{ if or (eq $currentPage.RelPermalink .URL) (and (eq .URL "/") $currentPage.IsHome) }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
    <button class="hamburger" aria-label="選單" aria-expanded="false">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </button>
    <div class="nav-right">
      <div class="nav-brand-inline">
        <span class="nav-brand-name">格子工具誌</span>
        <span class="nav-brand-sub">GRID TOOLS DIARY</span>
      </div>
      <a href="/about/" class="nav-about">關於</a>
    </div>
  </div>
  <div class="mobile-menu">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}" class="mobile-tab-item{{ if or (eq $currentPage.RelPermalink .URL) (and (eq .URL "/") $currentPage.IsHome) }} active{{ end }}">{{ .Name }}</a>
    {{ end }}
    <a href="/about/" class="mobile-tab-item{{ if eq $currentPage.RelPermalink "/about/" }} active{{ end }}">關於</a>
  </div>
</nav>
