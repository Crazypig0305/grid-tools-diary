baseURL = 'https://gridtoolsdiary.com/'
title = '格子工具誌'
languageCode = 'zh-TW'
theme = 'gridtools'
enableRobotsTXT = true
hasCJKLanguage = true
enableGitInfo = false

# Disable taxonomy + term pages to remove thin tag/category archive pages from sitemap.
# Layouts do not display tag/category badges anywhere, so disabling is safe with zero
# front-end impact. Removes ~75 URLs from sitemap and stops Hugo from generating
# /tags/* and /categories/* archive pages. Already-indexed thin pages will 404 and
# naturally drop from Google index. Mirrors A site fix (commit 074e02b).
disableKinds = ['taxonomy', 'term']

[outputs]
  home = ["HTML", "RSS"]

[pagination]
  pagerSize = 12

[params]
  tagline = '我測了這個工具，這是結果'
  description = '效率工具、隱私安全、掛機 App、理財工具——每篇都有實際使用結論，告訴你值不值得裝'
  aboutText = '32 歲，數位產業工作者。裝過太多沒用的 App，現在任何工具至少比兩個才下決定。'
  aboutLink = '/about/'

[[menus.main]]
  name = '全部文章'
  url = '/'
  weight = 1

[[menus.main]]
  name = '效率工具'
  url = '/productivity/'
  weight = 2

[[menus.main]]
  name = '賺錢工具'
  url = '/earn-apps/'
  weight = 3

[[menus.main]]
  name = '理財工具'
  url = '/finance-tools/'
  weight = 4

[[menus.main]]
  name = '隱私安全'
  url = '/privacy/'
  weight = 5

[taxonomies]
  tag = 'tags'
  category = 'categories'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
